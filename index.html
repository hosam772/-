<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1b4a31">
<title>Dominoes</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{
  height:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  user-select:none;-webkit-user-select:none;touch-action:none;
  background:#000;overscroll-behavior:none;
}
#stage{position:fixed;inset:0;background:#1b4a31;overflow:hidden;}
#game{
  position:relative;width:1080px;height:100vh;
  transform-origin:top left;overflow:hidden;
  background:radial-gradient(130% 70% at 50% 45%, #2e8f6a 0%, #1b5c41 45%, #0a3a26 100%), #1b4a31;
  box-shadow:0 0 80px rgba(0,0,0,.8);
}
#game::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
    radial-gradient(rgba(0,0,0,.05) 1px,transparent 1px);
  background-size:3px 3px,5px 5px;background-position:0 0,1px 2px;
  mix-blend-mode:overlay;opacity:.6;
}

/* ===== GOLD FRAME — thin ornate border around the PLAY AREA only ===== */
.gold-frame{display:none}

/* ===== TOP PROFILES ===== */
.profile{
  position:absolute;top:38px;width:190px;z-index:8;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.profile.left{left:46px}
.profile.right{right:46px}
.profile-avatar{
  position:relative;width:140px;height:140px;
}
.profile-avatar .ring{
  position:absolute;inset:0;border-radius:20px;
  box-shadow:0 4px 8px rgba(0,0,0,.4);
}
.profile.left .profile-avatar .ring{
  background:linear-gradient(180deg,#3aa8e0,#1d6ea8);
  border:4px solid #8fd4ff;
}
.profile.right .profile-avatar .ring{
  background:linear-gradient(180deg,#d94c3f,#a33229);
  border:4px solid #ffb8a8;
}
.profile-avatar .face{
  position:absolute;inset:14px;border-radius:14px;background:#2d5b86;
  background-image:
    radial-gradient(circle at 50% 38%, #e0d5c8 26%, transparent 27%),
    radial-gradient(ellipse 55% 45% at 50% 105%, #e0d5c8 50%, transparent 51%);
}
/* Square timer (rounded corners matching ring) */
.timer-ring{
  position:absolute;inset:-8px;pointer-events:none;
  opacity:0;transition:opacity .25s;
}
.timer-ring.active{opacity:1}
.timer-ring svg{width:100%;height:100%;display:block;overflow:visible}
.timer-ring rect{
  fill:none;stroke:#4ce388;stroke-width:7;stroke-linecap:round;
  filter:drop-shadow(0 0 8px rgba(80,255,140,.9));
}
.timer-ring.warning rect{
  stroke:#ff4d4d;
  filter:drop-shadow(0 0 10px rgba(255,77,77,1));
  animation:warnPulse .4s ease-in-out infinite;
}
@keyframes warnPulse{
  0%,100%{stroke-width:7;opacity:1}
  50%{stroke-width:9;opacity:.7}
}
.profile-name{
  color:#fff;font-weight:700;font-size:18px;
  text-shadow:0 2px 3px rgba(0,0,0,.7);
}
.profile-score{
  color:#fff;font-weight:900;font-size:32px;line-height:1;
  text-shadow:0 2px 3px rgba(0,0,0,.7);
  background:rgba(0,0,0,.38);padding:4px 16px;border-radius:10px;
  border:2px solid rgba(255,255,255,.2);
  min-width:70px;text-align:center;
}
/* Tile count badge on avatar */
.tile-count{
  position:absolute;bottom:-4px;right:-8px;
  background:linear-gradient(180deg,#f5c850,#d48f1a);
  color:#000;font-weight:900;font-size:20px;
  padding:2px 10px;border-radius:14px;border:2px solid #fff;
  box-shadow:0 2px 4px rgba(0,0,0,.5);
  min-width:36px;text-align:center;
  z-index:4;
}

/* ===== DECK (opponent tile count — lowered further to clear score) ===== */
.deck-badge{
  position:absolute;left:30px;top:355px;
  padding:10px 20px 10px 14px;border-radius:0 26px 26px 0;
  background:linear-gradient(180deg,#8b5a2e 0%,#5c3a1c 100%);
  color:#fff8dc;font-weight:900;font-size:30px;
  box-shadow:0 4px 6px rgba(0,0,0,.5),inset 0 2px 0 rgba(255,200,130,.25);
  border:2px solid #6b4a28;border-left:none;
  z-index:7;display:flex;align-items:center;gap:10px;
  transition:opacity .2s;
}
.deck-badge.disabled{opacity:.5;cursor:not-allowed}
.deck-icon{width:44px;height:36px;position:relative;flex-shrink:0}
.deck-icon::before,.deck-icon::after,.deck-icon span{
  content:"";position:absolute;width:18px;height:30px;
  background:linear-gradient(180deg,#fff4d6,#e0c79a);
  border:1.5px solid #6b4a28;border-radius:3px;
}
.deck-icon::before{left:0;top:4px;transform:rotate(-8deg)}
.deck-icon span{left:12px;top:1px;transform:rotate(2deg)}
.deck-icon::after{left:22px;top:4px;transform:rotate(10deg)}

/* ===== OPPONENT HAND (face-down, proper 2:1 domino proportions - vertical) ===== */
.opp-hand{
  position:absolute;left:160px;right:160px;top:180px;height:144px;
  display:flex;gap:8px;align-items:center;justify-content:center;z-index:4;
  flex-wrap:nowrap;overflow:visible;
}
.opp-slot{
  flex:0 0 auto;width:72px;height:144px;
  background:linear-gradient(180deg,#ffffff 0%,#f8f2e6 60%,#e8dcc4 100%);
  border:2px solid #9a8868;border-radius:10px;
  box-shadow:0 3px 5px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.7);
  transition:opacity .3s, transform .3s;
  position:relative;
}
.opp-slot.hidden{display:none}

/* ===== PLAY AREA ===== */
.play-area{
  position:absolute;left:48px;right:48px;top:320px;bottom:480px;
  z-index:3;overflow:visible;
}
.chain-world{
  position:absolute;left:50%;top:50%;
  width:2400px;height:2400px;
  margin-left:-1200px;margin-top:-1200px;
  transform-origin:50% 50%;transform:scale(1);
  transition:transform 400ms cubic-bezier(.25,.9,.4,1);
  pointer-events:none;
}
.chain-tile{
  position:absolute;transform-origin:50% 50%;
  /* Shadow hidden per req 10 */
  pointer-events:none;
}
.drop-zone{position:absolute;pointer-events:none;opacity:0}

.banner{
  position:absolute;left:50%;top:45%;transform:translate(-50%,-50%) scale(.85);
  padding:20px 46px;border-radius:20px;
  background:linear-gradient(180deg,rgba(0,0,0,.9),rgba(0,0,0,.75));
  color:#ffe27a;font-weight:900;font-size:42px;letter-spacing:1px;
  box-shadow:0 8px 24px rgba(0,0,0,.7);
  border:3px solid rgba(255,215,106,.5);
  opacity:0;pointer-events:none;z-index:30;
  transition:opacity .22s,transform .22s;white-space:nowrap;
}
.banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* ===== PLAYER HAND (fits 7 tiles without scroll; scrolls if more) ===== */
.player-hand-wrap{
  position:absolute;left:30px;right:30px;bottom:56px;
  height:380px;z-index:6;overflow:hidden;
}
.player-hand{
  position:absolute;inset:0;
  display:flex;align-items:center;
  padding:16px 10px;
  overflow-x:auto;overflow-y:hidden;
  scroll-behavior:smooth;
  scrollbar-width:none;-ms-overflow-style:none;
  -webkit-overflow-scrolling:touch;
  gap:6px;
  justify-content:flex-start;
  touch-action:pan-x;
}
.player-hand.centered{justify-content:center}
.player-hand::-webkit-scrollbar{display:none}
.hand-tile{
  flex:0 0 auto;
  /* 7 tiles across with gap; ~142px per tile in 1080px wide minus padding/gaps */
  width:136px;height:272px;
  position:relative;cursor:grab;
  transition:transform .2s, opacity .25s;
  scroll-snap-align:center;
  touch-action:none;
}
.hand-tile:active{cursor:grabbing}
.hand-tile.dragging{transition:none !important;z-index:1000;
  filter:drop-shadow(0 16px 20px rgba(0,0,0,.7))}
.hand-tile.playable{animation:glow-hand 1.8s ease-in-out infinite}
.hand-tile.unplayable{opacity:.35;filter:grayscale(.5) brightness(.7);cursor:not-allowed;pointer-events:none}
@keyframes glow-hand{
  0%,100%{filter:drop-shadow(0 0 4px rgba(0,0,0,.3))}
  50%{filter:drop-shadow(0 0 16px rgba(255,222,110,.95))}
}
.tile-svg{width:100%;height:100%;display:block}

.flying-tile{
  position:fixed;z-index:900;pointer-events:none;
  transform-origin:50% 50%;
}

/* ===== BONEYARD PICKER — wooden tray with tile back slots ===== */
.bone-picker-wrap{
  position:absolute;left:30px;right:30px;top:420px;
  height:420px;z-index:10;
  display:none;align-items:center;justify-content:center;
  padding:0 10px;
}
.bone-picker-wrap.show{display:flex}
.bone-picker{
  position:relative;width:100%;max-width:720px;
  background:linear-gradient(180deg,#6b4a28,#3a2812);
  border:4px solid #d48f1a;border-radius:18px;
  padding:18px 18px 50px 18px;
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  grid-template-rows:repeat(2, 1fr);
  gap:8px;
  box-shadow:0 8px 16px rgba(0,0,0,.55), inset 0 2px 0 rgba(255,200,130,.15);
}
.bone-tile{
  position:relative;cursor:pointer;
  aspect-ratio:1/2;
  transition:transform .15s, opacity .25s;
  touch-action:none;
}
.bone-tile:active{transform:scale(.94)}
.bone-tile.taken{visibility:hidden}
.bone-tile .back{
  width:100%;height:100%;
  background-image:url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADoAAABwCAYAAABPeGMiAAAFHUlEQVR42u3dTWhcVRQH8P859735SNo3tbampA3EClaJoFhdiKviwoWEqrTVpZviplB0U+pmyEYUBENrF2m6aLcDgkg0BXHVulSkReiiBbGQtDT9MJl5mc68e46LmUknk2k+bNGZ6blwyeLeudzfO/dmXl7unAHalEKh4FSV0IVFVdvOPWjTkYnIA8CpU6dejKL+V5hplwi75T2l5ZWMR2tv7bO+dmZSVf27UvF/XLx48XciWgCAfD7PY2NjS4NQC5KISKenp9/OZtOfhmG4L4qiMJvNgsjh8UK1XpunQutuJ9LGnFFNqiguxIjj+Fq5XJ48ceLEyampqbgeNGmGUh0p58//+PmOHTuOb9v+DDLpDDKZjDjnlJl15UTRMpGNtD/6GEQEEYH3nr33XCqVEMcxZmZmfrty5coHhw8fvtoIXlAPMxGRTE9PfTH87PCxKIpkS26rcr2oKohoHRPfSPujjUFEgALOOThXW23pdFr6+/slCMJXRfwPZ86c2QdgNp/Pc1AoFNyhQ4f81PR37+zaNXRs61Nbk1wu51TBzLw0yEro//5LBwSCNkXdJ54zmQxv2/Z0lUif9776DRG9r6rEBw8elL1794absrnjuVxOoygiVSXngiVkJxYiAqj2s1HDVAgACMMwrEV303uTk5NvEpEERKTj4+N7Uqn0G319m4jIsWOGC4Jue1sBESEIAlSrVURRJIODg3zz5s0DAH5hABgYGHgtiiJOp9NCRMQdHMnVItzYXgSCc47SmTSc45cAEANAKpUa7O/vRxAEQujK+4TlYCYolJgYzG47gBQ3bhLQY6UWYUAVbimiy9/ctcfI2vZ2pXciCoCY0XhX7Fko1rgBNahBDWpQgxrUoAZtDxVp/jOHLKIGNWjnlKYHQwKQ1LcoAXAWUYMatKOgDCgD6nrSb0vXoN0NFYuoQQ3a0VC2iBrUoAY1qEENuvGyymEi6alrYkv3CYBqr+/R5ue6Anuua1CDGtSgBjWoQQ1qUIMa1KAGNahBDboKlFpqL0OVameNehtqe9SgXQi1c0YGNWhnQ+2ckUENalCDGvRxllWO36wnlZZBbeka9L9butpSqYehpLWzRuCeC7btUYMa1KAGNahBDfokQrXtaXnuSafW7tVVAaJaSusAAJIkKVYqlVp715daFmUVQLzCey0BSBgA4ji+PD8/T+Xyoqslu1SoKpbk2k0BraeMVhXvvTLztSXohQsXfi2WijOlYgkiIokXqDzAahdJvfdQKMrl+3Tn7h2K4/hnAGBVdefOnbvnEz+Z+ITKi4teVeG9fxDJ+rpvrm03x7K6zg31r/s/qKoeqgIRDy8JVMUXiwvuxsyNPy9duvStqlIAQFSVTp8+/XUYhu8S6OUtRNVspi8QFYIHRGRFVvMVWc6p5X+sa+UmphagrnFIhB5yQVQhjfTyChDB35q7RXfu3sX9yv2jY2Nj8yMjI45qfWtJ68+enXhu9+49U8PDwy9kMn26efNmz8xULy3ja0dAG0n5oZDFxUUuFos8d3sO1/+6/sno6P7xRnr6oN5Z8/k8f/TRx9dOnvzyrSRJvkqnsx8ODQ0FfX19YOZ15Knf6KcTFdr0GsJap2EevsRVFZVqhW/P3ca9e/cuLyzMfzY6un+qgUTryM1fNDExMfH6zp07DwRBMCIiA2vPfINQBrhp4iJYB7TNMEwQ0SI5XI2LpZ+OHDn6/ezs7LLvkXjY1aE2yb9DAKkOrsvmWygUVnyw7h8mhkZx5xFWPAAAAABJRU5ErkJggg==');
  background-size:100% 100%;background-repeat:no-repeat;
  filter:drop-shadow(0 3px 5px rgba(0,0,0,.45));
}
/* "Draw from boneyard" label in bottom slot of the tray */
.bone-picker::after{
  content:"اسحب ورقة";
  position:absolute;left:0;right:0;bottom:14px;
  display:flex;align-items:center;justify-content:center;
  color:#fff8dc;font-weight:900;font-size:22px;
  letter-spacing:1px;
  text-shadow:0 2px 3px rgba(0,0,0,.7);
  pointer-events:none;
}
.bone-heading{display:none}
.bone-tile .label{display:none}

/* ===== WOOD FLOOR ===== */
.wood-strip{
  position:absolute;left:0;right:0;bottom:0;height:48px;
  background:linear-gradient(180deg,#7a4a24 0%,#5a3318 50%,#3f2210 100%);
  box-shadow:inset 0 4px 8px rgba(0,0,0,.5),0 -3px 10px rgba(0,0,0,.45);
  z-index:1;
}
.wood-strip::before{content:"";position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(90deg,rgba(0,0,0,.22) 0 1px,transparent 1px 34px),
    repeating-linear-gradient(180deg,rgba(0,0,0,.1) 0 1px,transparent 1px 3px);
  opacity:.7}

/* Goal ribbon — target 100 pts, center-top of screen */
.goal-ribbon{
  position:absolute;left:50%;top:16px;transform:translateX(-50%);
  width:150px;padding:16px 0 22px 0;
  background:linear-gradient(180deg,#8a2a0e 0%,#b8421a 50%,#c85523 100%);
  border:3px solid #ffc657;border-top:none;
  box-shadow:0 6px 12px rgba(0,0,0,.5),inset 0 -4px 8px rgba(0,0,0,.3);
  text-align:center;z-index:9;
  clip-path:polygon(0 0,100% 0,100% 82%,50% 100%,0 82%);
}
.goal-ribbon .lbl{color:#ffe27a;font-size:15px;font-weight:700;letter-spacing:.5px;margin-bottom:2px}
.goal-ribbon .num{color:#fff;font-size:48px;font-weight:900;line-height:1;
  text-shadow:0 2px 4px rgba(0,0,0,.6)}

/* Chat button + panel */
.chat-btn{
  position:absolute;left:30px;bottom:460px;
  width:70px;height:70px;border-radius:50%;
  background:linear-gradient(180deg,#4fa8dc,#2772a8);
  border:4px solid #fff;
  box-shadow:0 4px 10px rgba(0,0,0,.5),inset 0 2px 0 rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:32px;cursor:pointer;z-index:7;
}
.chat-btn:active{transform:scale(.92)}
.chat-panel{
  position:absolute;left:30px;bottom:540px;
  background:linear-gradient(180deg,#6b4a28,#3a2812);
  border:3px solid #d48f1a;border-radius:22px;
  padding:22px 20px;z-index:9;
  display:none;flex-direction:column;gap:16px;
  box-shadow:0 12px 30px rgba(0,0,0,.8);
  width:520px;max-width:calc(100vw - 60px);
  animation:chat-open .28s cubic-bezier(.25,1.2,.5,1);
}
@keyframes chat-open{
  from{opacity:0;transform:translateY(20px) scale(.85)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.chat-panel.show{display:flex}
.chat-emojis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.chat-emoji-btn{
  width:90px;height:90px;background:rgba(255,255,255,.12);
  border:3px solid rgba(255,200,100,.45);border-radius:16px;
  cursor:pointer;padding:6px;
  transition:transform .15s, background .2s, border-color .2s;
}
.chat-emoji-btn:hover{background:rgba(255,220,140,.2);border-color:rgba(255,220,140,.7)}
.chat-emoji-btn:active{transform:scale(.88)}
.chat-emoji-btn img{width:100%;height:100%;display:block}
.chat-msgs{display:none}
.chat-msg-btn{display:none}

/* Text input row for chat */
.chat-input-row{
  display:flex;gap:10px;margin-top:4px;
}
.chat-input-row input{
  flex:1;padding:14px 18px;border-radius:14px;
  border:3px solid #a88c4e;background:#fff8dc;
  color:#5c3a1c;font-size:20px;font-weight:600;
  outline:none;min-width:0;
  font-family:inherit;
}
.chat-input-row input:focus{border-color:#d48f1a}
.chat-send{
  padding:14px 24px;border-radius:14px;
  background:linear-gradient(180deg,#f5c850,#d48f1a);
  color:#5c3a1c;font-weight:900;font-size:20px;
  border:3px solid #ffe082;cursor:pointer;
  flex-shrink:0;
  font-family:inherit;
}
.chat-send:active{transform:scale(.95)}

/* Forfeit (surrender) button */
.forfeit-btn{
  position:absolute;right:30px;bottom:460px;
  width:70px;height:70px;border-radius:50%;
  background:linear-gradient(180deg,#d94c3f,#8a1e16);
  border:4px solid #fff;
  color:#fff;font-size:34px;line-height:1;
  box-shadow:0 4px 10px rgba(0,0,0,.5),inset 0 2px 0 rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:7;
  font-family:inherit;
}
.forfeit-btn:active{transform:scale(.92)}

/* Forfeit confirmation modal */
.forfeit-overlay{
  position:absolute;inset:0;z-index:50;
  background:rgba(0,0,0,.7);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;
  padding:40px;
}
.forfeit-overlay.show{display:flex}
.forfeit-box{
  max-width:540px;width:100%;
  background:linear-gradient(180deg,#fff 0%,#f0e4d0 100%);
  border:4px solid #d94c3f;border-radius:22px;
  padding:32px 28px;text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,.8);
}
.forfeit-title{
  color:#a33229;font-weight:900;font-size:36px;
  margin-bottom:18px;
}
.forfeit-text{
  color:#3a2812;font-size:24px;font-weight:600;
  line-height:1.5;margin-bottom:28px;
}
.forfeit-actions{
  display:flex;gap:16px;justify-content:center;
}
.forfeit-cancel,.forfeit-confirm{
  padding:16px 32px;border-radius:12px;
  font-weight:900;font-size:22px;border:none;cursor:pointer;
  font-family:inherit;
}
.forfeit-cancel{
  background:linear-gradient(180deg,#888,#555);color:#fff;
}
.forfeit-confirm{
  background:linear-gradient(180deg,#d94c3f,#7a1e16);color:#fff;
  border:2px solid #ff9080;
}
.forfeit-cancel:active,.forfeit-confirm:active{transform:scale(.95)}

/* Chat bubble shown above avatar when message sent */
.chat-bubble{
  position:absolute;z-index:15;
  background:#fff;color:#333;
  padding:14px 20px;border-radius:22px;
  font-weight:700;font-size:20px;
  box-shadow:0 6px 16px rgba(0,0,0,.55);
  opacity:0;transform:translateY(10px) scale(.7);
  transition:opacity .3s,transform .3s cubic-bezier(.25,1.4,.5,1);
  pointer-events:none;
  max-width:260px;
  white-space:normal;
  text-align:center;
}
.chat-bubble.show{opacity:1;transform:translateY(0) scale(1)}
/* Emoji bubble — no background, just the sticker pops out */
.chat-bubble.emoji-bubble{
  background:transparent;box-shadow:none;
  padding:0;
  transform:translateY(10px) scale(.3);
}
.chat-bubble.emoji-bubble.show{
  transform:translateY(0) scale(1);
  animation:emoji-pop .6s cubic-bezier(.25,1.6,.4,1);
}
@keyframes emoji-pop{
  0%{transform:translateY(20px) scale(.2) rotate(-15deg)}
  60%{transform:translateY(-8px) scale(1.15) rotate(5deg)}
  80%{transform:translateY(0) scale(.95) rotate(-2deg)}
  100%{transform:translateY(0) scale(1) rotate(0deg)}
}
.chat-bubble.emoji-bubble::after{display:none}
.chat-bubble::after{
  content:"";position:absolute;bottom:-10px;
  border:10px solid transparent;border-top-color:#fff;
  border-bottom:0;
}
.chat-bubble.left::after{left:30px}
.chat-bubble.right::after{right:30px}
.chat-bubble img{width:60px;height:60px;display:block;margin:0 auto}
/* LARGER emoji in bubble (stickers from original game) */
.chat-bubble.emoji-bubble img{
  width:180px;height:180px;
  filter:drop-shadow(0 8px 16px rgba(0,0,0,.6));
}
</style>
</head>
<body>
<div id="stage"><div id="game">

  <div class="gold-frame"></div>

  <!-- Goal ribbon — target 100 pts at center top -->
  <div class="goal-ribbon">

const audioCache = {};
function playSound(key){
  try{
    let a = audioCache[key];
    if(!a){ a = new Audio(SOUNDS[key]); a.volume=0.6; audioCache[key]=a; }
    a.currentTime = 0;
    a.play().catch(()=>{});
  }catch(_){}
}

/* Brief haptic beep for timer warning */
let audioCtx = null;
function ensureAudioCtx(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(_){}
  }
  return audioCtx;
}
function playBeep(freq=880, dur=0.1){
  const ctx = ensureAudioCtx();
  if(!ctx) return;
  try{
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  }catch(_){}
}

const PIP_COLORS = {
  0:'#000',1:'#d7263d',2:'#2a9d4f',3:'#8b2fa8',
  4:'#ef7f1a',5:'#2363c7',6:'#c72672'
};
const PIP_POS = {
  0:[], 1:[[50,50]], 2:[[28,28],[72,72]],
  3:[[28,28],[50,50],[72,72]],
  4:[[28,28],[72,28],[28,72],[72,72]],
  5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
  6:[[28,28],[72,28],[28,50],[72,50],[28,72],[72,72]]
};
function tileSVG(v1,v2,orient){
  const c1=PIP_COLORS[v1], c2=PIP_COLORS[v2];
  const pipsA = PIP_POS[v1].map(([x,y])=>`<circle cx="${x}" cy="${y}" r="10" fill="${c1}"/>`).join('');
  const pipsB = PIP_POS[v2].map(([x,y])=>`<circle cx="${x+100}" cy="${y}" r="10" fill="${c2}"/>`).join('');
  return `<svg class="tile-svg" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <linearGradient id="tg${v1}${v2}${orient||'h'}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="45%" stop-color="#f5efe5"/>
        <stop offset="100%" stop-color="#d4c8b0"/>
      </linearGradient>
      <filter id="fb${v1}${v2}${orient||'h'}" x="-5%" y="-5%" width="110%" height="110%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="1"/>
        <feOffset dx="0" dy="1"/>
        <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <rect x="3" y="3" width="194" height="94" rx="14" ry="14"
          fill="url(#tg${v1}${v2}${orient||'h'})"
          stroke="#9a8868" stroke-width="1.5"/>
    <rect x="6" y="6" width="188" height="14" rx="10" ry="10"
          fill="#ffffff" opacity="0.6"/>
    <line x1="100" y1="18" x2="100" y2="82" stroke="#8a7858" stroke-width="2.5" opacity="0.75"/>
    <g filter="url(#fb${v1}${v2}${orient||'h'})">${pipsA}${pipsB}</g>
  </svg>`;
}
function handTileHTML(v1,v2){
  return `<div style="width:100%;height:100%;position:relative;overflow:visible;">
    <div style="position:absolute;left:50%;top:50%;width:272px;height:136px;
      transform:translate(-50%,-50%) rotate(90deg);">
      ${tileSVG(v1,v2,'v')}
    </div>
  </div>`;
}

/* ==========================================================================
   SNAKE CHAIN
   ========================================================================== */
const ROT_0=0, ROT_90=90, ROT_180=180, ROT_270=270;
const DIR_FORWARD=0, DIR_BACKWARD=1;
const ITEM_GAP=2.0;
const PLAY_DUR=420;
const BIG_SCALE=1.7;
const SHRINK_DUR=280;
const TURN_SECONDS=20;
const WARN_SECONDS=5;    // Start warning at 5 seconds left
const WIN_SCORE=100;
const REVEAL_DUR=5000;   // 5s reveal of loser's tiles

const DIRS=[
  {x:1,y:0,angle:ROT_0},{x:0,y:1,angle:ROT_90},
  {x:-1,y:0,angle:ROT_180},{x:0,y:-1,angle:ROT_270}
];

const WORLD_W=2400, WORLD_H=2400;
const TILE_L=180, TILE_S=90;
const SNAKE_BOUNDS = { x:120, y:120, w:WORLD_W-240, h:WORLD_H-240 };

class Domino{
  constructor(v1,v2){
    this.v1=v1;this.v2=v2;
    this.x=0;this.y=0;this.rot=0;
    this.isDouble = v1===v2;
    this.mPreDomino=null;this.mNextDomino=null;
    this.zOrder=0; this.el=null;
  }
}
class Snake{
  constructor(bounds,L,S){
    this.bounds=bounds; this.L=L; this.S=S;
    this.beginX=bounds.x+bounds.w/2; this.beginY=bounds.y+bounds.h/2;
    this.head=null; this.tail=null; this.count=0;
    this.fwdDirIdx=0; this.bwdDirIdx=2;
    this.fwdValue=0; this.bwdValue=0;
    this.fwdPoint={x:0,y:0}; this.bwdPoint={x:0,y:0};
    this._nextZ=1;
  }
  get tiles(){
    const out=[]; let c=this.head;
    while(c){ out.push(c); c=c.mNextDomino; }
    return out;
  }
  checkEdge(cx,cy,hw,hh){
    const b=this.bounds;
    return cx-hw>=b.x && cx+hw<=b.x+b.w && cy-hh>=b.y && cy+hh<=b.y+b.h;
  }
  placeFirst(v1,v2){
    const d=new Domino(v1,v2);
    d.x=this.beginX; d.y=this.beginY;
    d.rot = d.isDouble?ROT_90:ROT_0;
    d.zOrder = this._nextZ++;
    this.head=this.tail=d; this.count=1;
    const sz = d.isDouble?this.S:this.L;
    this.fwdValue=v2; this.bwdValue=v1;
    this.fwdPoint={x:d.x+sz/2, y:d.y};
    this.bwdPoint={x:d.x-sz/2, y:d.y};
    this.fwdDirIdx=0; this.bwdDirIdx=2;
    return d;
  }
  canAttach(v1,v2,side){
    if(this.count===0) return 'any';
    const need = side===DIR_FORWARD?this.fwdValue:this.bwdValue;
    return (v1===need||v2===need) ? need : null;
  }
  hasLegalPlacement(v1,v2){
    if(this.count===0) return true;
    return this.canAttach(v1,v2,DIR_FORWARD)!==null
        || this.canAttach(v1,v2,DIR_BACKWARD)!==null;
  }
  place(v1,v2,side){
    if(this.count===0){ return this.placeFirst(v1,v2); }
    const need = side===DIR_FORWARD?this.fwdValue:this.bwdValue;
    let from,to;
    if(v1===need){from=v1;to=v2;}
    else if(v2===need){from=v2;to=v1;}
    else return null;
    const d = new Domino(from,to);
    d.isDouble = v1===v2;
    const prevDirIdx = side===DIR_FORWARD?this.fwdDirIdx:this.bwdDirIdx;
    let dirIdx = prevDirIdx;
    const startPt = side===DIR_FORWARD?this.fwdPoint:this.bwdPoint;
    
    const prevTile = side===DIR_FORWARD ? this.tail : this.head;
    const prevAlong = prevTile.isDouble ? this.S : this.L;
    const prevAcross = prevTile.isDouble ? this.L : this.S;
    
    for(let i=0; i<4; i++){
      const dir = DIRS[dirIdx];
      const along = d.isDouble?this.S:this.L;
      const across = d.isDouble?this.L:this.S;
      
      /* ======================================================================
         CORNER LAYOUT FORMULA — derived from L-shape flush-edge geometry
         ======================================================================
         
         For an L-shape where prev tile (horizontal, heading E) meets new tile
         (vertical, heading S), the correct position of new tile's center is:
         
           new_center = prev_center + prevDir * (prevAlong/2 - newAcross/2)
                      + newDir * (prevAcross/2 + GAP + newAlong/2)
         
         Intuition:
           • prevDir * (prevAlong/2 - newAcross/2) = reach prev tile's end,
             then pull BACK by newAcross/2 so the new tile's OUTER edge
             aligns with prev tile's OUTER edge (flush corner).
           • newDir * (prevAcross/2 + GAP + newAlong/2) = step out of prev
             tile's body, cross the gap, then reach new tile's center.
         
         Since startPt = prev_center + prevDir * prevAlong/2 already,
         we express it as:
         
           new_center = startPt + prevDir * (-newAcross/2)
                      + newDir  * (prevAcross/2 + GAP + newAlong/2)
         ====================================================================== */
      const isTurn = dirIdx !== prevDirIdx;
      let cx, cy;
      if(isTurn){
        const prevDir = DIRS[prevDirIdx];
        cx = startPt.x
           + prevDir.x * (-across/2)                  // pull back by newAcross/2
           + dir.x     * (prevAcross/2 + ITEM_GAP + along/2);
        cy = startPt.y
           + prevDir.y * (-across/2)
           + dir.y     * (prevAcross/2 + ITEM_GAP + along/2);
      } else {
        // Straight continuation — simple formula
        cx = startPt.x + dir.x * (along/2 + ITEM_GAP);
        cy = startPt.y + dir.y * (along/2 + ITEM_GAP);
      }
      
      const hw = (Math.abs(dir.x)*along + Math.abs(dir.y)*across)/2;
      const hh = (Math.abs(dir.y)*along + Math.abs(dir.x)*across)/2;
      if(this.checkEdge(cx,cy,hw,hh)){
        d.x=cx; d.y=cy;
        d.rot = d.isDouble?(dir.angle+90)%360:dir.angle;
        
        /* fwdPoint for the NEXT tile:
           - If next placement goes STRAIGHT, it should be at THIS tile's
             forward-edge center (cx + dir*along/2).
           - If next placement TURNS, the corner formula above accounts for
             the edge offset automatically. So fwdPoint = forward edge center
             works correctly in both cases. */
        const nex = cx + dir.x * along/2;
        const ney = cy + dir.y * along/2;
        
        if(side===DIR_FORWARD){
          d.mPreDomino=this.tail; this.tail.mNextDomino=d;
          this.tail=d; this.fwdDirIdx=dirIdx; this.fwdValue=to;
          this.fwdPoint={x:nex,y:ney};
        } else {
          d.mNextDomino=this.head; this.head.mPreDomino=d;
          this.head=d; this.bwdDirIdx=dirIdx; this.bwdValue=to;
          this.bwdPoint={x:nex,y:ney};
        }
        d.zOrder = this._nextZ++;
        this.count++;
        return d;
      }
      dirIdx = side===DIR_FORWARD?(dirIdx+1)&3:(dirIdx+3)&3;
    }
    return null;
  }
}

   DOM REFS & STATE
   ========================================================================== */
const HAND_SIZE=7;
const playArea = document.getElementById('play-area');
const chainWorld = document.getElementById('chain-world');
const handEl = document.getElementById('player-hand');
const handWrap = document.querySelector('.player-hand-wrap');
const oppHandEl = document.getElementById('opp-hand');
const deckNum = document.getElementById('deck-num');
const deckBadge = document.getElementById('deck-badge');
const banner = document.getElementById('banner');
const scoreP = document.getElementById('score-player');
const scoreC = document.getElementById('score-cpu');
const tileCountP = document.getElementById('tile-count-player');
const tileCountC = document.getElementById('tile-count-cpu');
const timerRingP = document.getElementById('timer-ring-player');
const timerRingC = document.getElementById('timer-ring-cpu');
const bonePicker = document.getElementById('bone-picker');
const chatBtn = document.getElementById('chat-btn');
const chatPanel = document.getElementById('chat-panel');
const chatEmojis = document.getElementById('chat-emojis');

// Opponent hand: slots are dynamically created to match cpuHand.length
// so ALL opponent tiles are always visible, even if CPU draws from boneyard.

let playerScore=0, cpuScore=0;
let deck=[], playerHand=[], cpuHand=[];
let snake = new Snake(SNAKE_BOUNDS, TILE_L, TILE_S);
let turn='player', busy=false;
let cpuMisses=0, playerMisses=0;
let timerTimeout=null, warnTimeout=null;
let lastRoundWinner=null;       // 'player' or 'cpu' — for next-round starter
let inBoneyardMode=false;       // true when player must pick from boneyard
let firstRound=true;

function buildSet(){
  const s=[];
  for(let i=0;i<=6;i++) for(let j=i;j<=6;j++) s.push([i,j]);
  return s;
}
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function resetRound(){
  deck = shuffle(buildSet());
  playerHand = deck.splice(0,HAND_SIZE);
  cpuHand = deck.splice(0,HAND_SIZE);
  snake = new Snake(SNAKE_BOUNDS, TILE_L, TILE_S);
  chainWorld.innerHTML = '';
  chainWorld.style.transition = 'none';
  chainWorld.style.transform = 'translate(0,0) scale(1)';
  cpuMisses=0; playerMisses=0;
  busy=true;
  inBoneyardMode=false;
  hideBoneyardPicker();
}

function pickStarter(){
  // Only used for FIRST round. Highest double, tie → highest single-tile sum.
  // Winner has right to play first (not forced to play the double itself).
  let fP=-1,fC=-1,bP=-1,bC=-1;
  for(let i=0;i<playerHand.length;i++){const[a,b]=playerHand[i];if(a===b&&a>bP){bP=a;fP=i;}}
  for(let i=0;i<cpuHand.length;i++){const[a,b]=cpuHand[i];if(a===b&&a>bC){bC=a;fC=i;}}
  if(bP===-1&&bC===-1){
    // No doubles — highest total tile wins
    let vP=-1,vC=-1;
    for(let i=0;i<playerHand.length;i++){const[a,b]=playerHand[i];if(a+b>vP){vP=a+b;fP=i;}}
    for(let i=0;i<cpuHand.length;i++){const[a,b]=cpuHand[i];if(a+b>vC){vC=a+b;fC=i;}}
    return vP>=vC?'player':'cpu';
  }
  return bP>=bC?'player':'cpu';
}

/* ==========================================================================
   TILE DOM
   ========================================================================== */
function createTileElement(d){
  const el = document.createElement('div');
  el.className = 'chain-tile';
  el.style.width = TILE_L + 'px';
  el.style.height = TILE_S + 'px';
  el.style.left = (WORLD_W/2 - TILE_L/2) + 'px';
  el.style.top  = (WORLD_H/2 - TILE_S/2) + 'px';
  const sceneCX = SNAKE_BOUNDS.x + SNAKE_BOUNDS.w/2;
  const sceneCY = SNAKE_BOUNDS.y + SNAKE_BOUNDS.h/2;
  const dx = d.x - sceneCX;
  const dy = d.y - sceneCY;
  el.style.transform = `translate(${dx}px, ${dy}px) rotate(${d.rot}deg)`;
  el.innerHTML = tileSVG(d.v1, d.v2, 'h');
  el.style.zIndex = d.zOrder;
  d.el = el;
  chainWorld.appendChild(el);
  return el;
}

function computeChainBounds(){
  if(snake.count===0) return null;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const t of snake.tiles){
    const along = t.isDouble ? TILE_S : TILE_L;
    const across = t.isDouble ? TILE_L : TILE_S;
    const isHoriz = (t.rot===0 || t.rot===180);
    const w = isHoriz ? along : across;
    const h = isHoriz ? across : along;
    if(t.x-w/2 < minX) minX = t.x-w/2;
    if(t.y-h/2 < minY) minY = t.y-h/2;
    if(t.x+w/2 > maxX) maxX = t.x+w/2;
    if(t.y+h/2 > maxY) maxY = t.y+h/2;
  }
  return {minX,minY,maxX,maxY};
}

let currentScale = 1.0;
function updateWorldScale(animate=true){
  const areaRect = playArea.getBoundingClientRect();
  if(snake.count===0){
    currentScale = 1.0;
    chainWorld.style.transition = animate ? 'transform 400ms cubic-bezier(.25,.9,.4,1)' : 'none';
    chainWorld.style.transform = 'translate(0,0) scale(1)';
    return;
  }
  const b = computeChainBounds();
  const chainCX = (b.minX + b.maxX) / 2;
  const chainCY = (b.minY + b.maxY) / 2;
  const sceneCX = SNAKE_BOUNDS.x + SNAKE_BOUNDS.w/2;
  const sceneCY = SNAKE_BOUNDS.y + SNAKE_BOUNDS.h/2;
  const chainW = Math.max(b.maxX - b.minX, TILE_L);
  const chainH = Math.max(b.maxY - b.minY, TILE_L);
  const maxW = areaRect.width * 0.94;
  const maxH = areaRect.height * 0.94;
  const fitS = Math.min(maxW/chainW, maxH/chainH);
  const MAX_SCALE = Math.min(maxW/(TILE_L*2.2), maxH/(TILE_L*2));
  const targetScale = Math.min(fitS, MAX_SCALE);
  currentScale = targetScale;
  const dx = (sceneCX - chainCX) * targetScale;
  const dy = (sceneCY - chainCY) * targetScale;
  chainWorld.style.transition = animate
    ? 'transform 420ms cubic-bezier(.25,.9,.4,1)'
    : 'none';
  chainWorld.style.transform = `translate(${dx}px, ${dy}px) scale(${targetScale})`;
}

/* ==========================================================================
   DROP ZONES (invisible, generous)
   ========================================================================== */
const dropZones = { fwd:null, bwd:null };
function ensureDropZones(){
  for(const s of ['fwd','bwd']){
    if(!dropZones[s]){
      const d = document.createElement('div');
      d.className='drop-zone'; d.dataset.side=s;
      playArea.appendChild(d); dropZones[s]=d;
    }
  }
}
function positionDropZones(){
  ensureDropZones();
  const areaRect = playArea.getBoundingClientRect();
  if(snake.count===0){
    const z=dropZones.fwd, d=dropZones.bwd;
    z.style.left='0px';z.style.top='0px';
    z.style.width=areaRect.width+'px';z.style.height=areaRect.height+'px';
    d.style.display='none';
    return;
  }
  dropZones.bwd.style.display='';
  const b = computeChainBounds();
  const chainCX = (b.minX + b.maxX)/2;
  const chainCY = (b.minY + b.maxY)/2;
  const scale = currentScale;
  for(const side of ['fwd','bwd']){
    const isFwd = side==='fwd';
    const dirIdx = isFwd ? snake.fwdDirIdx : snake.bwdDirIdx;
    const pt = isFwd ? snake.fwdPoint : snake.bwdPoint;
    const dir = DIRS[dirIdx];
    const along = TILE_L, across = TILE_S;
    const cx = pt.x + dir.x*along/2;
    const cy = pt.y + dir.y*along/2;
    const ZONE_BIG = 2.6;
    const w = (Math.abs(dir.x)*along + Math.abs(dir.y)*across) * ZONE_BIG;
    const h = (Math.abs(dir.y)*along + Math.abs(dir.x)*across) * ZONE_BIG;
    const screenX = areaRect.width/2 + (cx - chainCX)*scale;
    const screenY = areaRect.height/2 + (cy - chainCY)*scale;
    const screenW = w*scale;
    const screenH = h*scale;
    const z = dropZones[side];
    z.style.left = (screenX - screenW/2)+'px';
    z.style.top  = (screenY - screenH/2)+'px';
    z.style.width = screenW+'px';
    z.style.height = screenH+'px';
  }
}

/* ==========================================================================
   HAND RENDERING
   ========================================================================== */
function renderHand(){
  if(inBoneyardMode) return;
  handEl.innerHTML = '';
  handEl.classList.toggle('centered', playerHand.length <= HAND_SIZE);
  handEl.style.display = '';
  playerHand.forEach((pair,i)=>{
    const t = document.createElement('div');
    t.className = 'hand-tile';
    t.dataset.v1 = pair[0]; t.dataset.v2 = pair[1]; t.dataset.index = i;
    t.innerHTML = handTileHTML(pair[0], pair[1]);
    handEl.appendChild(t);
    const canPlay = snake.hasLegalPlacement(pair[0],pair[1]);
    if(turn==='player' && !busy){
      if(canPlay){ t.classList.add('playable'); attachDrag(t); }
      else t.classList.add('unplayable');
    } else {
      if(!canPlay) t.classList.add('unplayable');
    }
  });
}

function renderOppHand(){
  // Clear & rebuild slots to match cpuHand exactly — shows ALL tiles
  oppHandEl.innerHTML = '';
  for(let i=0; i<cpuHand.length; i++){
    const s = document.createElement('div');
    s.className = 'opp-slot';
    oppHandEl.appendChild(s);
  }
}

function updateScores(){
  scoreP.textContent = playerScore;
  scoreC.textContent = cpuScore;
  deckNum.textContent = deck.length;
  deckBadge.style.display = deck.length>0 ? '' : 'none';
  tileCountP.textContent = playerHand.length;
  tileCountC.textContent = cpuHand.length;
}

/* ==========================================================================
   DRAG & DROP
   ========================================================================== */
let dragState=null;
function attachDrag(tile){
  tile.addEventListener('pointerdown', onDragStart);
}
function onDragStart(e){
  if(turn!=='player' || busy || inBoneyardMode) return;
  const tile=e.currentTarget;
  if(tile.classList.contains('unplayable')) return;
  const v1=+tile.dataset.v1, v2=+tile.dataset.v2;
  if(!snake.hasLegalPlacement(v1,v2)) return;
  try{ tile.setPointerCapture(e.pointerId); }catch(_){}
  const rect = tile.getBoundingClientRect();
  const clone = document.createElement('div');
  clone.className = 'hand-tile dragging';
  clone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;pointer-events:none`;
  clone.innerHTML = handTileHTML(v1, v2);
  document.body.appendChild(clone);
  tile.style.opacity = '0.15';
  dragState = {
    tile, clone, v1, v2, idx:+tile.dataset.index,
    startRect:rect,
    grabDX:e.clientX-rect.left-rect.width/2,
    grabDY:e.clientY-rect.top-rect.height/2,
    pointerId:e.pointerId
  };
  tile.addEventListener('pointermove', onDragMove);
  tile.addEventListener('pointerup', onDragEnd);
  tile.addEventListener('pointercancel', onDragEnd);
  e.preventDefault();
  e.stopPropagation();
}
function onDragMove(e){
  if(!dragState) return;
  const {clone,startRect,grabDX,grabDY}=dragState;
  clone.style.left = (e.clientX-grabDX-startRect.width/2)+'px';
  clone.style.top  = (e.clientY-grabDY-startRect.height/2)+'px';
}
function onDragEnd(e){
  if(!dragState) return;
  const {tile,clone,v1,v2,idx}=dragState;
  const zone = zoneUnderPoint(e.clientX, e.clientY);
  let sideIdx=null;
  if(zone){
    const s = zone.dataset.side==='fwd' ? DIR_FORWARD : DIR_BACKWARD;
    if(canPlayerDrop(s)) sideIdx=s;
  }
  if(sideIdx===null){
    const areaRect = playArea.getBoundingClientRect();
    const insideArea = e.clientX>=areaRect.left && e.clientX<=areaRect.right
      && e.clientY>=areaRect.top && e.clientY<=areaRect.bottom;
    if(insideArea){
      const f = canPlayerDrop(DIR_FORWARD), b = canPlayerDrop(DIR_BACKWARD);
      if(f && !b) sideIdx = DIR_FORWARD;
      else if(b && !f) sideIdx = DIR_BACKWARD;
      else if(f && b){
        const svgRect = playArea.getBoundingClientRect();
        const b1 = computeChainBounds();
        const chainCX = (b1.minX + b1.maxX)/2;
        const chainCY = (b1.minY + b1.maxY)/2;
        const scale = currentScale;
        function dist(pt){
          const sx = svgRect.left + svgRect.width/2 + (pt.x-chainCX)*scale;
          const sy = svgRect.top  + svgRect.height/2 + (pt.y-chainCY)*scale;
          return Math.hypot(e.clientX-sx, e.clientY-sy);
        }
        sideIdx = dist(snake.fwdPoint) < dist(snake.bwdPoint) ? DIR_FORWARD : DIR_BACKWARD;
      }
    }
  }
  let placed=null;
  if(sideIdx!==null) placed = snake.place(v1,v2,sideIdx);
  clone.remove(); tile.style.opacity='';
  try{ tile.releasePointerCapture(dragState.pointerId); }catch(_){}
  tile.removeEventListener('pointermove', onDragMove);
  tile.removeEventListener('pointerup', onDragEnd);
  tile.removeEventListener('pointercancel', onDragEnd);
  dragState=null;
  if(placed){
    stopTimer();
    playerHand.splice(idx,1);
    renderHand();
    updateScores();
    const el = createTileElement(placed);
    playSound('tileput');
    animateLandAndShrink(el, placed);
    updateWorldScale(true);
    setTimeout(()=>{ positionDropZones(); endTurn(); }, Math.max(PLAY_DUR, SHRINK_DUR) + 80);
  }
}
function zoneUnderPoint(x,y){
  for(const side of ['fwd','bwd']){
    const z=dropZones[side];
    if(!z || z.style.display==='none') continue;
    const r=z.getBoundingClientRect();
    if(x>=r.left && x<=r.right && y>=r.top && y<=r.bottom) return z;
  }
  return null;
}
function canPlayerDrop(sideIdx){
  if(!dragState) return false;
  if(snake.count===0) return true;
  return snake.canAttach(dragState.v1, dragState.v2, sideIdx) !== null;
}

/* Conditional animation: land BIG → scale down smoothly with ease-out.
   Rotation is integrated into the same transform (single-property animation)
   so aspect ratio is preserved and motion stays smooth.
   
   - Uses CSS `scale()` which inherently preserves the tile's aspect ratio
   - Single ease-out cubic-bezier: starts fast, slows near end (never abrupt)
   - Rotation animates in parallel — tile lands rotated into its final pose */
function animateLandAndShrink(el, d){
  const sceneCX = SNAKE_BOUNDS.x + SNAKE_BOUNDS.w/2;
  const sceneCY = SNAKE_BOUNDS.y + SNAKE_BOUNDS.h/2;
  const dx = d.x - sceneCX;
  const dy = d.y - sceneCY;
  const finalRot = d.rot;
  
  // Start BIG and slightly pre-rotated (90% of target angle) — so the last
  // part of the animation smoothly finishes the rotation as the tile settles.
  // This is the "conditional rotation" effect: rotation completes at the
  // exact moment the scale reaches 1.0 (tile fully landed).
  const startRot = finalRot * 0.85;  // 85% of final angle at start
  
  el.style.transition = 'none';
  el.style.transformOrigin = '50% 50%';  // Rotate around center, not corner
  el.style.transform = `translate(${dx}px, ${dy}px) rotate(${startRot}deg) scale(${BIG_SCALE})`;
  el.getBoundingClientRect();  // Force reflow
  
  // Ease-out cubic-bezier: strong decel at end — looks natural
  // cubic-bezier(0.25, 0.46, 0.45, 0.94) = ease-out quad
  el.style.transition = `transform ${SHRINK_DUR}ms cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
  el.style.transform = `translate(${dx}px, ${dy}px) rotate(${finalRot}deg) scale(1)`;
  
  setTimeout(()=>{
    el.style.transition = '';
    el.style.transform = `translate(${dx}px, ${dy}px) rotate(${finalRot}deg)`;
  }, SHRINK_DUR + 40);
}

/* ==========================================================================
   TIMER (20s, warn at 5s with red + beep)
   ========================================================================== */
const RING_PERIM = 376;  // rect perimeter for 94x94 with radius 17
function startTimer(who){
  stopTimer();
  const ring = who==='player' ? timerRingP : timerRingC;
  const otherRing = who==='player' ? timerRingC : timerRingP;
  otherRing.classList.remove('active','warning');
  ring.classList.add('active');
  ring.classList.remove('warning');
  const rect = ring.querySelector('rect');
  rect.style.transition = 'none';
  rect.style.strokeDashoffset = '0';
  rect.getBoundingClientRect();
  rect.style.transition = `stroke-dashoffset ${TURN_SECONDS}s linear`;
  rect.style.strokeDashoffset = RING_PERIM;

  warnTimeout = setTimeout(()=>{
    ring.classList.add('warning');
    if(who==='player') playBeep(900, 0.08);
    // Continue beeping each second until timeout
    let beeps = 0;
    const beepInterval = setInterval(()=>{
      beeps++;
      if(beeps >= WARN_SECONDS || !ring.classList.contains('warning')){
        clearInterval(beepInterval);
        return;
      }
      if(who==='player') playBeep(900, 0.08);
    }, 1000);
  }, (TURN_SECONDS - WARN_SECONDS)*1000);

  timerTimeout = setTimeout(()=>{
    ring.classList.remove('warning');
    if(who==='player' && turn==='player' && !busy){
      // AI fallback — play best move or draw
      autoPlayerAction();
    }
  }, TURN_SECONDS*1000);
}
function stopTimer(){
  if(timerTimeout){ clearTimeout(timerTimeout); timerTimeout=null; }
  if(warnTimeout){ clearTimeout(warnTimeout); warnTimeout=null; }
  [timerRingP, timerRingC].forEach(r=>{
    r.classList.remove('active','warning');
    const rect = r.querySelector('rect');
    rect.style.transition='none';
    rect.style.strokeDashoffset='0';
  });
}
function autoPlayerAction(){
  if(turn!=='player' || busy) return;
  const canPlay = playerHand.some(p=>snake.hasLegalPlacement(p[0],p[1]));
  if(canPlay){
    // AI: play highest-scoring playable tile
    let bestIdx=-1,bestSide=null,bestScore=-1;
    for(let i=0;i<playerHand.length;i++){
      const[a,b]=playerHand[i];
      if(!snake.hasLegalPlacement(a,b)) continue;
      const fwd = snake.canAttach(a,b,DIR_FORWARD)!==null;
      const sc = a+b + (a===b?5:0);
      if(sc>bestScore){bestScore=sc;bestIdx=i;bestSide=fwd?DIR_FORWARD:DIR_BACKWARD;}
    }
    if(bestIdx>=0){
      const[v1,v2]=playerHand[bestIdx];
      const placed=snake.place(v1,v2,bestSide);
      if(placed){
        playerHand.splice(bestIdx,1);
        renderHand();
        updateScores();
        const el=createTileElement(placed);
        playSound('tileput');
        animateLandAndShrink(el,placed);
        updateWorldScale(true);
        setTimeout(()=>{ positionDropZones(); endTurn(); }, Math.max(PLAY_DUR,SHRINK_DUR)+80);
      }
    }
  } else if(deck.length>0){
    // AI draws a random tile from boneyard automatically
    autoDrawForPlayer();
  } else {
    showBanner('Pass', 900);
    setTimeout(endTurn, 900);
  }
}

function autoDrawForPlayer(){
  if(deck.length===0){ setTimeout(endTurn,500); return; }
  const idx = Math.floor(Math.random()*deck.length);
  const [a,b] = deck.splice(idx,1)[0];
  playerHand.push([a,b]);
  playSound('tiledraw');
  renderHand();
  updateScores();
  // Close boneyard picker if open
  hideBoneyardPicker();
  if(snake.hasLegalPlacement(a,b)){
    // Let player attempt; restart timer
    showBoneyardOrHand();
    startTimer('player');
  } else if(deck.length>0){
    // Still can't play — AI draws again
    setTimeout(autoDrawForPlayer, 500);
  } else {
    showBanner('Pass', 900);
    setTimeout(endTurn, 900);
  }
}

/* ==========================================================================
   BONEYARD PICKER — wooden tray above player hand with tile backs
   ========================================================================== */
function showBoneyardPicker(){
  if(deck.length===0){ setTimeout(endTurn, 500); return; }
  inBoneyardMode = true;
  const wrap = document.getElementById('bone-picker-wrap');
  wrap.classList.add('show');
  bonePicker.innerHTML = '';
  deck.forEach((tile, idx)=>{
    const t = document.createElement('div');
    t.className = 'bone-tile';
    t.dataset.idx = idx;
    t.innerHTML = '<div class="back"></div>';
    t.addEventListener('click', ()=>pickBoneTile(t, idx));
    bonePicker.appendChild(t);
  });
  // Fill remaining slots with empty (keep 14 slot grid visual)
  for(let i=deck.length; i<14; i++){
    const t = document.createElement('div');
    t.className = 'bone-tile taken';
    bonePicker.appendChild(t);
  }
}

function hideBoneyardPicker(){
  inBoneyardMode = false;
  const wrap = document.getElementById('bone-picker-wrap');
  wrap.classList.remove('show');
  bonePicker.innerHTML = '';
}

function pickBoneTile(tileEl, deckIdx){
  if(turn!=='player' || busy) return;
  stopTimer();
  // Find tile by current index (may shift as others are taken)
  // We use deckIdx which is the original index, but deck may have shrunk
  // Fix: find it by dataset, translate to current deck position
  const allBones = Array.from(bonePicker.children);
  // Count how many BEFORE this element have been taken
  let currentPos = 0;
  for(const el of allBones){
    if(el === tileEl) break;
    if(!el.classList.contains('taken')) currentPos++;
  }
  if(currentPos >= deck.length) return;
  const [a,b] = deck.splice(currentPos, 1)[0];
  playerHand.push([a,b]);
  playSound('tiledraw');
  // Mark taken — preserves layout
  tileEl.classList.add('taken');
  updateScores();

  // Check if now can play
  if(snake.hasLegalPlacement(a,b)){
    // Player can play — close boneyard, show hand
    hideBoneyardPicker();
    renderHand();
    startTimer('player');
  } else if(deck.length > 0){
    // Keep boneyard open for another pick. Restart timer
    startTimer('player');
  } else {
    // Exhausted — pass
    hideBoneyardPicker();
    renderHand();
    showBanner('Pass', 900);
    setTimeout(endTurn, 900);
  }
}

function showBoneyardOrHand(){
  // Decide: if player has no playable tile and deck has tiles → boneyard
  // Otherwise show hand
  const canPlay = playerHand.some(p=>snake.hasLegalPlacement(p[0],p[1]));
  if(!canPlay && deck.length>0){
    showBoneyardPicker();
  } else {
    hideBoneyardPicker();
    renderHand();
  }
}

/* ==========================================================================
   TURN MANAGEMENT
   ========================================================================== */
function setTurn(who){
  turn = who;
  updateScores();
  if(who==='player'){
    const canPlay = playerHand.some(p=>snake.hasLegalPlacement(p[0],p[1]));
    if(!canPlay && deck.length>0){
      // Auto-open boneyard for player
      renderHand();  // show hand briefly
      setTimeout(()=>{
        showBoneyardPicker();
        startTimer('player');
      }, 300);
    } else if(!canPlay && deck.length===0){
      renderHand();
      showBanner('Pass', 900);
      setTimeout(endTurn, 1000);
    } else {
      renderHand();
      startTimer('player');
    }
  } else {
    renderHand(); // just updates playable states
    startTimer('cpu');
  }
}

function countPips(hand){ return hand.reduce((s,[a,b])=>s+a+b, 0); }

/* ==========================================================================
   END TURN / ROUND END WITH REVEAL
   ========================================================================== */
function endTurn(){
  stopTimer();
  if(playerHand.length===0){
    // Player won round
    const earned = countPips(cpuHand);
    playSound('gamewin');
    lastRoundWinner = 'player';
    revealLoserTilesAndScore('player', earned);
    return;
  }
  if(cpuHand.length===0){
    // CPU won round
    const earned = countPips(playerHand);
    playSound('gameloss');
    lastRoundWinner = 'cpu';
    revealLoserTilesAndScore('cpu', earned);
    return;
  }
  const pCan = playerHand.some(p=>snake.hasLegalPlacement(p[0],p[1]));
  const cCan = cpuHand.some(p=>snake.hasLegalPlacement(p[0],p[1]));
  if(!pCan && !cCan && deck.length===0){
    // Blocked
    const pp = countPips(playerHand);
    const cp = countPips(cpuHand);
    if(pp < cp){
      playSound('gamewin');
      lastRoundWinner = 'player';
      revealLoserTilesAndScore('player', cp);
    } else if(cp < pp){
      playSound('gameloss');
      lastRoundWinner = 'cpu';
      revealLoserTilesAndScore('cpu', pp);
    } else {
      showBanner('Draw', 1500);
      setTimeout(startNextRound, 1600);
    }
    return;
  }
  setTurn(turn==='player' ? 'cpu' : 'player');
  if(turn==='cpu') setTimeout(cpuTurn, 700);
}

function revealLoserTilesAndScore(winner, points){
  // Hide all chain tiles and show the loser's remaining tiles for 5s
  busy = true;
  stopTimer();
  // Fade out chain
  const allChainTiles = Array.from(chainWorld.querySelectorAll('.chain-tile'));
  allChainTiles.forEach(el=>{
    el.style.transition = 'opacity .4s';
    el.style.opacity = '0';
  });

  const loserHand = winner==='player' ? cpuHand : playerHand;
  // Create reveal overlay in play-area
  const reveal = document.createElement('div');
  reveal.style.cssText = `
    position:absolute;inset:0;z-index:20;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  `;
  reveal.innerHTML = `
    <div style="color:#ffe27a;font-size:34px;font-weight:900;text-align:center;
         text-shadow:0 2px 4px rgba(0,0,0,.6);margin-bottom:10px">
      ${winner==='player'?'Your Points':'CPU Points'} +${points}
    </div>
    <div id="reveal-tiles" style="display:flex;flex-wrap:wrap;gap:14px;
         justify-content:center;max-width:90%;"></div>
  `;
  playArea.appendChild(reveal);

  const grid = reveal.querySelector('#reveal-tiles');
  loserHand.forEach(([a,b])=>{
    const tileDiv = document.createElement('div');
    tileDiv.style.cssText = 'width:140px;height:70px;';
    tileDiv.innerHTML = tileSVG(a,b,'h');
    grid.appendChild(tileDiv);
  });

  setTimeout(()=>{
    reveal.remove();
    if(winner==='player') playerScore += points;
    else cpuScore += points;
    updateScores();
    checkMatchEnd();
  }, REVEAL_DUR);
}

function checkMatchEnd(){
  if(playerScore >= WIN_SCORE){
    showBanner('🏆 You Won the Match!', 3500);
    busy=true;
    return;
  }
  if(cpuScore >= WIN_SCORE){
    showBanner('💀 CPU Won the Match', 3500);
    busy=true;
    return;
  }
  setTimeout(startNextRound, 1000);
}

/* ==========================================================================
   DEAL ANIMATION — tiles fly from deck to each player's hand at round start
   (Alternates player/cpu with tiledraw.ogg sound from original game)
   ========================================================================== */
function animateDeal(onComplete){
  // Hide the hand/opp-hand briefly during dealing
  handEl.style.opacity = '0';
  oppHandEl.querySelectorAll('.opp-slot').forEach(s => s.style.opacity = '0');
  
  // Compute source (deck badge) and target positions in screen coords
  const deckRect = deckBadge.getBoundingClientRect();
  const sx = deckRect.left + deckRect.width/2;
  const sy = deckRect.top + deckRect.height/2;
  
  const handRect = document.querySelector('.player-hand-wrap').getBoundingClientRect();
  const oppRect = oppHandEl.getBoundingClientRect();
  
  const STEP = 130;   // ms between consecutive tile throws
  const FLY_DUR = 340;
  
  function dealOne(targetX, targetY, delay, toPlayer){
    setTimeout(()=>{
      // Create flying tile (face-down back)
      const fly = document.createElement('div');
      fly.className = 'flying-tile';
      const W = 72, H = 96;   // Small flying tile
      fly.style.cssText = `
        position:fixed;z-index:900;pointer-events:none;
        left:${sx - W/2}px;top:${sy - H/2}px;
        width:${W}px;height:${H}px;
        background:linear-gradient(180deg,#ffffff 0%,#f8f2e6 55%,#e8dcc4 100%);
        border:2px solid #9a8868;border-radius:8px;
        box-shadow:0 4px 8px rgba(0,0,0,.5);
        transform:scale(.4) rotate(-8deg);opacity:0;
        transform-origin:50% 50%;
        transition:transform ${FLY_DUR}ms cubic-bezier(0.25,0.46,0.45,0.94),
                   left ${FLY_DUR}ms cubic-bezier(0.25,0.46,0.45,0.94),
                   top ${FLY_DUR}ms cubic-bezier(0.25,0.46,0.45,0.94),
                   opacity ${FLY_DUR*0.35}ms ease-out;
      `;
      document.body.appendChild(fly);
      // Play draw sound at release
      playSound('tiledraw');
      // Trigger animation
      fly.getBoundingClientRect();
      fly.style.left = (targetX - W/2)+'px';
      fly.style.top = (targetY - H/2)+'px';
      fly.style.transform = `scale(1) rotate(${toPlayer ? 2 : -2}deg)`;
      fly.style.opacity = '1';
      // Remove after landing
      setTimeout(()=>{
        fly.style.transition = 'opacity 150ms ease-out';
        fly.style.opacity = '0';
        setTimeout(()=> fly.remove(), 180);
      }, FLY_DUR);
    }, delay);
  }
  
  // Alternate dealing: player, cpu, player, cpu, ... (7 each = 14 total)
  let delay = 0;
  for(let i=0; i<HAND_SIZE; i++){
    // Player hand target
    const tx_p = handRect.left + handRect.width * (i + 0.5) / HAND_SIZE;
    const ty_p = handRect.top + handRect.height/2;
    dealOne(tx_p, ty_p, delay, true);
    delay += STEP;
    // CPU hand target
    const tx_c = oppRect.left + oppRect.width * (i + 0.5) / HAND_SIZE;
    const ty_c = oppRect.top + oppRect.height/2;
    dealOne(tx_c, ty_c, delay, false);
    delay += STEP;
  }
  
  // After all tiles dealt, fade in the hands
  setTimeout(()=>{
    handEl.style.transition = 'opacity .35s';
    handEl.style.opacity = '1';
    oppHandEl.querySelectorAll('.opp-slot').forEach(s=>{
      s.style.transition = 'opacity .35s';
      s.style.opacity = '';
    });
    if(onComplete) onComplete();
  }, delay + FLY_DUR - 100);
}

function startNextRound(){
  resetRound();
  renderHand();
  renderOppHand();
  updateScores();
  positionDropZones();
  const starter = lastRoundWinner || 'player';
  // Play deal animation, then start turn
  animateDeal(()=>{
    busy = false;
    if(starter==='player'){
      setTurn('player');
    } else {
      setTurn('cpu');
      setTimeout(cpuTurn, 500);
    }
  });
}

function showBanner(text, ms){
  banner.textContent = text;
  banner.classList.add('show');
  clearTimeout(showBanner._t);
  showBanner._t = setTimeout(()=>banner.classList.remove('show'), ms||1200);
}

/* ==========================================================================
   CPU TURN
   ========================================================================== */
function cpuTurn(){
  if(cpuHand.length===0 || busy) return;
  let bestIdx=-1, bestSide=null, bestScore=-1;
  for(let i=0;i<cpuHand.length;i++){
    const[a,b]=cpuHand[i];
    const fwd = snake.canAttach(a,b,DIR_FORWARD)!==null;
    const bwd = snake.canAttach(a,b,DIR_BACKWARD)!==null;
    if(!fwd && !bwd) continue;
    const score = a+b + (a===b?5:0);
    if(score>bestScore){
      bestScore=score; bestIdx=i;
      bestSide = fwd ? DIR_FORWARD : DIR_BACKWARD;
    }
  }
  if(bestIdx===-1){
    // CPU must draw from boneyard until playable or boneyard empty
    cpuDrawUntilPlayable();
    return;
  }
  const[v1,v2] = cpuHand[bestIdx];
  cpuHand.splice(bestIdx,1);
  stopTimer();
  playCpuTile(v1,v2,bestSide);
}

function cpuDrawUntilPlayable(){
  if(deck.length===0){
    showBanner('CPU Pass', 900);
    setTimeout(endTurn, 900);
    return;
  }
  // Draw one tile
  const idx = Math.floor(Math.random()*deck.length);
  const [a,b] = deck.splice(idx,1)[0];
  cpuHand.push([a,b]);
  playSound('tiledraw');
  renderOppHand();
  updateScores();
  showBanner('CPU Draws', 700);
  setTimeout(()=>{
    // Check if now can play
    if(snake.hasLegalPlacement(a,b)){
      setTimeout(cpuTurn, 400);  // retry with new tile
    } else {
      cpuDrawUntilPlayable();  // keep drawing
    }
  }, 750);
}

function playCpuTile(v1, v2, side){
  const placed = snake.place(v1,v2,side);
  if(!placed){ setTimeout(endTurn,500); return; }
  const el = createTileElement(placed);
  el.style.opacity = '0';
  updateWorldScale(true);
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      const rect = el.getBoundingClientRect();
      const tx = rect.left + rect.width/2;
      const ty = rect.top + rect.height/2;
      const cpuRect = document.querySelector('.profile.right').getBoundingClientRect();
      const sx = cpuRect.left + cpuRect.width/2;
      const sy = cpuRect.top + cpuRect.height/2;
      const fly = document.createElement('div');
      fly.className = 'flying-tile';
      const flyW = rect.width * BIG_SCALE;
      const flyH = rect.height * BIG_SCALE;
      fly.style.cssText = `
        left:${sx-flyW/2}px;top:${sy-flyH/2}px;
        width:${flyW}px;height:${flyH}px;
        transform:rotate(${placed.rot*0.85}deg) scale(0.45);opacity:.5;
        transform-origin:50% 50%;
        transition:transform ${PLAY_DUR}ms cubic-bezier(0.25,0.46,0.45,0.94),
                   left ${PLAY_DUR}ms cubic-bezier(0.25,0.46,0.45,0.94),
                   top  ${PLAY_DUR}ms cubic-bezier(0.25,0.46,0.45,0.94),
                   opacity ${PLAY_DUR*0.45}ms ease-out;
      `;
      fly.innerHTML = tileSVG(v1, v2, 'h');
      document.body.appendChild(fly);
      fly.getBoundingClientRect();
      fly.style.left = (tx - flyW/2)+'px';
      fly.style.top  = (ty - flyH/2)+'px';
      fly.style.transform = `rotate(${placed.rot}deg) scale(1)`;
      fly.style.opacity = '1';
      setTimeout(()=>{
        playSound('tileput');
        fly.remove();
        el.style.opacity = '';
        animateLandAndShrink(el, placed);
        renderOppHand();
        positionDropZones();
        setTimeout(()=>{
          updateScores();
          endTurn();
        }, SHRINK_DUR + 60);
      }, PLAY_DUR + 20);
    }, 440);
  });
}

/* ==========================================================================
   CHAT (emojis + canned messages)
   ========================================================================== */
function buildChatEmojis(){
  chatEmojis.innerHTML = '';
  for(let i=1;i<=5;i++){
    const key = 'chat'+i;
    if(!EMOJIS[key]) continue;
    const b = document.createElement('button');
    b.className = 'chat-emoji-btn';
    b.innerHTML = `<img src="${EMOJIS[key]}"/>`;
    b.addEventListener('click', ()=>{
      playSound('click');
      chatPanel.classList.remove('show');
      sendChat('player', {emoji:key});
      // CPU reply randomly
      setTimeout(()=>{
        const rk = 'chat' + (1+Math.floor(Math.random()*5));
        sendChat('cpu', {emoji:rk});
      }, 1200 + Math.random()*800);
    });
    chatEmojis.appendChild(b);
  }
}
function sendChat(who, {text, emoji}){
  // Find existing bubble for this player and remove
  document.querySelectorAll('.chat-bubble.'+(who==='player'?'p':'c')).forEach(e=>e.remove());
  const bubble = document.createElement('div');
  const cls = ['chat-bubble', who==='player'?'left':'right', who==='player'?'p':'c'];
  if(emoji) cls.push('emoji-bubble');
  bubble.className = cls.join(' ');
  // Position near avatar
  const prof = document.querySelector('.profile.'+(who==='player'?'left':'right'));
  const r = prof.getBoundingClientRect();
  const gameR = document.getElementById('game').getBoundingClientRect();
  const g = document.getElementById('game');
  const sy = r.bottom - gameR.top + 16;
  if(who==='player'){
    bubble.style.left = (r.left - gameR.left + 80) + 'px';
    bubble.style.top  = sy + 'px';
  } else {
    bubble.style.right = (gameR.right - r.right + 80) + 'px';
    bubble.style.top  = sy + 'px';
  }
  if(emoji){
    bubble.innerHTML = `<img src="${EMOJIS[emoji]}"/>`;
    // Play emoji sound from original game (emj1..emj5)
    const soundKey = emoji.replace('chat', 'emj');  // chat1 → emj1
    if(SOUNDS[soundKey]) playSound(soundKey);
  } else {
    bubble.textContent = text;
  }
  g.appendChild(bubble);
  setTimeout(()=>bubble.classList.add('show'), 20);
  setTimeout(()=>{
    bubble.classList.remove('show');
    setTimeout(()=>bubble.remove(), 400);
  }, emoji ? 3200 : 2600);  // Emoji bubble stays a bit longer to appreciate the animation
}

chatBtn.addEventListener('click', (e)=>{
  e.stopPropagation();
  playSound('click');
  chatPanel.classList.toggle('show');
});

// Custom text message input
const chatInput = document.getElementById('chat-input');
const chatSend = document.getElementById('chat-send');
function sendTypedChat(){
  const msg = chatInput.value.trim();
  if(!msg) return;
  playSound('click');
  chatInput.value = '';
  chatPanel.classList.remove('show');
  sendChat('player', {text:msg});
  setTimeout(()=>{
    const replies = ['Thanks!','Nice!','Wow!','Good move!','Oops!','Best of luck!','😊','👍'];
    sendChat('cpu', {text: replies[Math.floor(Math.random()*replies.length)]});
  }, 1200 + Math.random()*800);
}
chatSend.addEventListener('click', sendTypedChat);
chatInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') sendTypedChat();
});
// Prevent chat panel from closing when interacting with it
chatPanel.addEventListener('click', (e)=>e.stopPropagation());
chatPanel.addEventListener('pointerdown', (e)=>e.stopPropagation());

// Close chat when clicking outside
document.addEventListener('click', (e)=>{
  if(!chatPanel.contains(e.target) && e.target !== chatBtn){
    chatPanel.classList.remove('show');
  }
});

/* ==========================================================================
   FORFEIT BUTTON (give up = lose match)
   ========================================================================== */
const forfeitBtn = document.getElementById('forfeit-btn');
const forfeitOverlay = document.getElementById('forfeit-overlay');
const forfeitCancel = document.getElementById('forfeit-cancel');
const forfeitConfirm = document.getElementById('forfeit-confirm');

forfeitBtn.addEventListener('click', (e)=>{
  e.stopPropagation();
  if(busy) return;
  forfeitOverlay.classList.add('show');
});
forfeitCancel.addEventListener('click', ()=>{
  forfeitOverlay.classList.remove('show');
});
forfeitConfirm.addEventListener('click', ()=>{
  forfeitOverlay.classList.remove('show');
  stopTimer();
  busy = true;
  // Set CPU score to max (simulate forfeit loss)
  cpuScore = WIN_SCORE;
  playerScore = 0;  // optionally keep player's score; "forfeit = lose everything"
  updateScores();
  playSound('gameloss');
  showBanner('💀 تم الانسحاب — خسرت المواجهة', 4000);
});

/* ==========================================================================
   DECK CLICK — opens boneyard picker (only if allowed)
   ========================================================================== */
deckBadge.addEventListener('click', ()=>{
  if(turn!=='player' || busy || deck.length===0 || inBoneyardMode) return;
  const canPlay = playerHand.some(p=>snake.hasLegalPlacement(p[0],p[1]));
  if(canPlay){ showBanner('You Have a Move', 900); return; }
  showBoneyardPicker();
});

/* ==========================================================================
   ROUND START
   ========================================================================== */
function startRound(){
  resetRound();
  updateScores();
  renderHand();
  renderOppHand();
  positionDropZones();
  // Deal animation at round start (matches original game behavior)
  animateDeal(()=>{
    let starter;
    if(firstRound){
      starter = pickStarter();
      lastRoundWinner = starter;
      firstRound = false;
    } else {
      starter = lastRoundWinner || 'player';
    }
    busy = false;
    if(starter==='player'){
      setTurn('player');
    } else {
      setTurn('cpu');
      setTimeout(cpuTurn, 500);
    }
  });
}

function init(){
  playerScore = 0;
  cpuScore = 0;
  firstRound = true;
  lastRoundWinner = null;
  buildChatEmojis();
  startRound();
}

window.addEventListener('load', ()=> setTimeout(init, 80));

let resizeTimer=null;
function onResize(){
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    fitGame();
    updateWorldScale(false);
    positionDropZones();
  }, 80);
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', ()=>setTimeout(onResize, 120));

let lastTouchEnd=0;
document.addEventListener('touchend', (e)=>{
  const now = Date.now();
  if(now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, {passive:false});

/* Unlock audio context on first interaction */
document.addEventListener('pointerdown', ()=>{ ensureAudioCtx(); }, {once:true});
</script>
